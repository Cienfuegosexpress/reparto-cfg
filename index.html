<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cienfuegos Express - Tarifas y Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 flex flex-col overflow-hidden">
        
        <header class="bg-blue-800 p-6 flex flex-col items-center text-center border-b border-blue-700">
            <h1 class="text-2xl font-black text-white uppercase">Cienfuegos Express</h1>
            <p class="text-xs text-blue-200">Logística de reparto local</p>
        </header>

        <main class="p-5 space-y-6">
            <button onclick="abrirRutaGoogleMaps()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">🚀 Ver ruta en Google Maps</button>
            
            <section class="space-y-4">
                <input type="text" id="buscarDireccion" placeholder="Escribe tu dirección..." class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl text-white">
                <div id="listaSugerencias" class="hidden bg-slate-950 border border-slate-700 rounded-xl"></div>
                
                <div id="resultadoTarifa" class="hidden bg-blue-950/30 p-4 rounded-xl border border-blue-500/30">
                    <p id="precioTexto" class="text-2xl font-black text-blue-400"></p>
                    <p id="detallesDireccion" class="text-sm italic"></p>
                    <button onclick="enviarPedidoWhatsApp()" class="w-full mt-4 bg-emerald-600 text-white font-bold py-3 rounded-xl">💬 Solicitar Domicilio</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        const DESTINO = "Restaurante Jota Jota, Cienfuegos, Cuba";
        const NUMERO_NORMAL = "5350980360";
        const NUMERO_DOMINGO = "5363401398";
        let baseDatos = [];
        let dirSel = "";
        let preSel = "";

        Papa.parse("direcciones.csv", {
            download: true, header: false, skipEmptyLines: true,
            complete: (res) => { baseDatos = res.data; }
        });

        function abrirRutaGoogleMaps() {
            window.open("https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(DESTINO), "_blank");
        }

        const input = document.getElementById("buscarDireccion");
        const lista = document.getElementById("listaSugerencias");
        
        input.addEventListener("input", function() {
            const val = this.value.toLowerCase();
            lista.innerHTML = "";
            if (val.length < 2) { lista.classList.add("hidden"); return; }
            
            const matches = baseDatos.filter(f => f[6] && f[6].toLowerCase().includes(val));
            
            if (matches.length > 0) {
                lista.classList.remove("hidden");
                matches.slice(0, 5).forEach(f => {
                    let btn = document.createElement("button");
                    btn.className = "w-full text-left p-3 border-b border-slate-800";
                    btn.innerHTML = f[6] + " - " + f[7] + " CUP";
                    btn.onclick = () => {
                        dirSel = f[6];
                        preSel = f[7] + " CUP";
                        document.getElementById("precioTexto").innerText = preSel;
                        document.getElementById("detallesDireccion").innerText = dirSel;
                        document.getElementById("resultadoTarifa").classList.remove("hidden");
                        lista.classList.add("hidden");
                    };
                    lista.appendChild(btn);
                });
            }
        });

        function enviarPedidoWhatsApp() {
            const esDom = new Date().getDay() === 0;
            const tel = esDom ? NUMERO_DOMINGO : NUMERO_NORMAL;
            const msg = "Hola, quiero pedir a: " + dirSel + ". Precio: " + preSel;
            window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(msg), "_blank");
        }
    </script>
</body>
</html>
