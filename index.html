<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>

        const DESTINO_RESTAURANTE = "Restaurante Jota Jota, 5301 Avenida 5 de Septiembre, Cienfuegos, Cuba";
        
        // REPARTIDORES: [0] = Número de siempre, [1] = Número de domingos
        const NUMERO_NORMAL = "5350980360";
        const NUMERO_DOMINGO = "5363401398";

        let baseDatosDirecciones = [];
        let direccionSeleccionada = "";
        let precioSeleccionado = "";

        // CARGAR CSV
        Papa.parse("direcciones.csv", {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(resultado) {
                var filas = resultado.data;
                if (filas.length > 0 && isNaN(parseFloat(filas[0][7]))) {
                    baseDatosDirecciones = filas.slice(1);
                } else {
                    baseDatosDirecciones = filas;
                }
            }
        });

        function sinAcentos(texto) {
            return (texto || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
        }

        // GOOGLE MAPS
        function abrirRutaGoogleMaps() {
            if (!navigator.geolocation) {
                window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(DESTINO_RESTAURANTE), "_blank");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    var url = "https://www.google.com/maps/dir/?api=1"
                        + "&origin=" + pos.coords.latitude + "," + pos.coords.longitude
                        + "&destination=" + encodeURIComponent(DESTINO_RESTAURANTE)
                        + "&travelmode=driving";
                    window.open(url, "_blank");
                },
                function() {
                    window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(DESTINO_RESTAURANTE), "_blank");
                }
            );
        }

        // BUSCADOR
        var inputBuscar       = document.getElementById("buscarDireccion");
        var listaSugerencias  = document.getElementById("listaSugerencias");
        var resultadoTarifa   = document.getElementById("resultadoTarifa");
        var precioTexto       = document.getElementById("precioTexto");
        var detallesDireccion = document.getElementById("detallesDireccion");
        var zonaTexto         = document.getElementById("zonaTexto");

        inputBuscar.addEventListener("input", function() {
            var valorOriginal = inputBuscar.value;
            var busqueda = sinAcentos(valorOriginal);
            listaSugerencias.innerHTML = "";

            if (busqueda.length === 0) {
                listaSugerencias.classList.add("hidden");
                return;
            }

            busqueda = busqueda.replace(/^ave?\b/, "avenida").replace(/^ca\b/, "calle");

            var coincidencias = baseDatosDirecciones.filter(function(fila) {
                if (!fila[6]) return false;
                return sinAcentos(fila[6]).includes(busqueda);
            });

            coincidencias.sort(function(a, b) {
                var da = sinAcentos(a[6]);
                var db = sinAcentos(b[6]);
                if (da.startsWith(busqueda) && !db.startsWith(busqueda)) return -1;
                if (!da.startsWith(busqueda) && db.startsWith(busqueda)) return 1;
                return 0;
            });

            coincidencias = coincidencias.slice(0, 5);

            if (coincidencias.length === 0) {
                listaSugerencias.classList.add("hidden");
                return;
            }

            listaSugerencias.classList.remove("hidden");

            coincidencias.forEach(function(fila) {
                var dir    = (fila[6] || "").trim();
                var precio = (fila[7] || "0").trim();
                var zona   = (fila[8] || "General").trim();

                var btn = document.createElement("button");
                btn.type = "button";
                btn.className = "w-full text-left p-3 hover:bg-slate-800 transition-colors border-b border-slate-800 last:border-0 block focus:outline-none cursor-pointer";
                btn.innerHTML = '<div class="font-medium text-slate-200">' + dir + '</div>' +
                                '<div class="text-xs text-emerald-400 mt-0.5 font-semibold">Precio: ' + precio + ' CUP • Zona: ' + zona + '</div>';

                btn.addEventListener("click", function() {
                    direccionSeleccionada = dir;
                    precioSeleccionado    = precio + " CUP";
                    precioTexto.innerText       = precioSeleccionado;
                    detallesDireccion.innerText = dir;
                    zonaTexto.innerText         = zona;
                    resultadoTarifa.classList.remove("hidden");
                    listaSugerencias.classList.add("hidden");
                    inputBuscar.value = dir;
                });
                listaSugerencias.appendChild(btn);
            });
        });

        // WHATSAPP INTELIGENTE
        function enviarPedidoWhatsApp() {
            if (!direccionSeleccionada) return;
            
            // Detectar si hoy es domingo (0 es domingo en JS)
            const hoyEsDomingo = new Date().getDay() === 0;
            const numeroDestino = hoyEsDomingo ? NUMERO_DOMINGO : NUMERO_NORMAL;
            
            const aviso = hoyEsDomingo ? "\n\n⚠️ *Hoy es domingo, envío gestionado por reparto exclusivo.*" : "";
            
            var mensaje = "¡Hola! 🛵\n\nQuiero solicitar un servicio de domicilio a la siguiente dirección:\n📍 *" + direccionSeleccionada + "*\n\nTarifa calculada: *" + precioSeleccionado + "*" + aviso;
            
            window.open("https://wa.me/" + numeroDestino + "?text=" + encodeURIComponent(mensaje), "_blank");
        }

    </script>
