<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cienfuegos Express - Tarifas y Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            /* Aquí ponemos el logo de fondo */
            background-image: url('logo.png');
            background-size: 500px;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f172a; /* Fondo azul oscuro */
        }
        /* Esto hace que el logo esté transparente */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: inherit;
            opacity: 0.1; /* Transparencia al 10% */
            z-index: -1;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen antialiased flex items-center justify-center p-0 sm:p-4">

    <div class="max-w-md w-full bg-slate-900/95 min-h-screen sm:min-h-0 sm:rounded-3xl shadow-2xl border border-slate-800 flex flex-col overflow-hidden backdrop-blur-sm">

        <header class="bg-gradient-to-b from-blue-700 to-blue-800 p-6 flex flex-col items-center text-center border-b border-blue-600 shadow-lg">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center overflow-hidden border-4 border-slate-950 shadow-xl mb-3">
                <img src="logo.png" alt="Cienfuegos Express" class="w-full h-full object-cover" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2972/2972185.png';">
            </div>
            <h1 class="text-2xl font-black tracking-wide text-white uppercase">Cienfuegos Express</h1>
            <p class="text-xs text-blue-200 font-medium mt-1">Logística de reparto local rápido</p>
        </header>

        <main class="p-5 flex-1 space-y-6">
            <div class="bg-slate-800/90 border border-slate-700 p-5 rounded-2xl shadow-xl space-y-3">
                <div class="flex items-center space-x-2"><span>🗺️</span><h2 class="font-bold text-base text-white">Ver ruta en Google Maps</h2></div>
                <button onclick="abrirRutaGoogleMaps()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-md text-sm cursor-pointer uppercase tracking-wider flex items-center justify-center gap-2">
                    🚀 Ver mi ruta en Google Maps
                </button>
            </div>

            <section class="bg-slate-800/90 p-5 rounded-2xl border border-slate-700 space-y-4 shadow-xl">
                <div class="flex items-center gap-2"><span class="text-xl">🔍</span><h2 class="font-bold text-base text-white">Consulta tu dirección</h2></div>
                <input type="text" id="buscarDireccion" placeholder="Ej: Calle 7, Avenida 62..." class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm shadow-inner">
                <div id="listaSugerencias" class="hidden max-h-56 overflow-y-auto bg-slate-950 border border-slate-700 rounded-xl divide-y divide-slate-800 text-sm shadow-2xl"></div>

                <div id="resultadoTarifa" class="hidden bg-gradient-to-br from-blue-950/50 to-slate-900/50 border border-blue-500/30 p-4 rounded-xl space-y-4">
                    <div class="flex justify-between items-baseline">
                        <span class="text-xs font-semibold text-blue-400 uppercase">Costo del Domicilio:</span>
                        <span id="precioTexto" class="font-black text-2xl text-blue-400"></span>
                    </div>
                    <div class="text-xs text-slate-300 space-y-2 pt-2 border-t border-slate-800">
                        <p class="font-bold text-slate-200">📌 Dirección de Entrega:</p>
                        <p id="detallesDireccion" class="italic text-slate-300 bg-slate-950/60 p-2 rounded border border-slate-800"></p>
                        <p class="pt-1">📍 <span class="font-semibold text-slate-400">Zona:</span> <span id="zonaTexto" class="text-blue-400 font-bold"></span></p>
                    </div>
                    <button onclick="enviarPedidoWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 cursor-pointer text-sm tracking-wide uppercase mt-2">
                        <span>💬</span> Solicitar Domicilio Ahora
                    </button>
                </div>
            </section>
        </main>

        <footer class="p-4 text-center text-[10px] text-slate-600 border-t border-slate-800 bg-slate-950/50">© 2026 Cienfuegos Express.</footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        const TEL_NORMAL = "5350980360";
        const TEL_DOMINGO = "5363401398";
        
        let baseDatosDirecciones = [];
        let direccionSeleccionada = "";
        let precioSeleccionado = "";

        Papa.parse("direcciones.csv", { download: true, header: false, skipEmptyLines: true, complete: (res) => { baseDatosDirecciones = res.data; }});

        function sinAcentos(t) { return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

        inputBuscar.addEventListener("input", function() {
            let busqueda = sinAcentos(this.value);
            listaSugerencias.innerHTML = "";
            if (busqueda.length < 2) { listaSugerencias.classList.add("hidden"); return; }
            let coincidencias = baseDatosDirecciones.filter(f => f[6] && sinAcentos(f[6]).includes(busqueda)).sort((a,b) => sinAcentos(a[6]).startsWith(busqueda) ? -1 : 1);
            
            if (coincidencias.length > 0) {
                listaSugerencias.classList.remove("hidden");
                coincidencias.slice(0, 5).forEach(f => {
                    let btn = document.createElement("button");
                    btn.className = "w-full text-left p-3 hover:bg-slate-800 border-b border-slate-800";
                    btn.innerHTML = `<div class='font-medium text-slate-200'>${f[6]}</div><div class='text-xs text-emerald-400'>Precio: ${f[7]} CUP</div>`;
                    btn.onclick = () => {
                        direccionSeleccionada = f[6]; precioSeleccionado = f[7] + " CUP";
                        document.getElementById("precioTexto").innerText = precioSeleccionado;
                        document.getElementById("detallesDireccion").innerText = f[6];
                        document.getElementById("zonaTexto").innerText = f[8] || "General";
                        resultadoTarifa.classList.remove("hidden"); listaSugerencias.classList.add("hidden"); inputBuscar.value = f[6];
                    };
                    listaSugerencias.appendChild(btn);
                });
            }
        });

        function enviarPedidoWhatsApp() {
            if (!direccionSeleccionada) return;
            // Lógica: Si es domingo, elige entre los dos números. Si no, solo el principal.
            let numeroElegido = (new Date().getDay() === 0) 
                ? (Math.random() > 0.5 ? TEL_DOMINGO : TEL_NORMAL) 
                : TEL_NORMAL;
                
            let msg = `¡Hola! 🛵\n\nQuiero solicitar un domicilio a:\n📍 *${direccionSeleccionada}*\n\nTarifa: *${precioSeleccionado}*`;
            window.open("https://wa.me/" + numeroElegido + "?text=" + encodeURIComponent(msg), "_blank");
        }
    </script>
</body>
</html>
